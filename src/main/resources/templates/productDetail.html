<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"></meta>
<title>产品详情</title>
<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" href="../static/css/bootstrap.min.css"/>
<link rel="stylesheet" th:href="@{/css/bootstrap-theme.min.css}" href="../static/css/bootstrap-theme.min.css"/>
</head>
<body>
	<div class="panel panel-primary">
		<div class="panel-heading">
			<h3 class="panel-title">产品详情</h3>
		</div>
	</div>
	<div class="container">
		<div class="col-md-12">
			<a href="/product/list" class="btn btn-default">返回列表</a>
			<div class="panel panel-primary" style="margin-top:20px;">
				<div class="panel-heading">
					<h3 class="panel-title" th:text="${product.name}">产品标题</h3>
				</div>
				<div class="panel-body">
					<div class="row">
						<div class="col-md-12">
							<table class="table">
								<tr>
									<th>产品名称</th>
									<td th:text="${product.name}">产品名称</td>
								</tr>
								<tr>
									<th>价格</th>
									<td th:text="${product.price}" th:style="${product.price >= 100} ? 'color:red' : ''">价格</td>
								</tr>
								<tr>
									<th>分类</th>
									<td th:text="${product.category != null ? product.category.categoryName : '未分类'}">分类</td>
								</tr>
							</table>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<script type="text/javascript" th:src="@{/js/jquery-1.11.0.min.js}" src="../static/js/jquery-1.11.0.min.js"></script>
	<script type="text/javascript" th:src="@{/js/bootstrap.min.js}" src="../static/js/bootstrap.min.js"></script>
</body>
</html>
