<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>首页</title>
<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" href="../static/css/bootstrap.min.css"/>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar navbar-default" style="margin-bottom: 0;">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="/">首页</a>
            </div>
            <div class="navbar-right" style="padding: 10px 20px;">
                <!-- 未登录显示登录 -->
                <a href="/userLogin" class="btn btn-primary btn-sm"
                   th:if="not ${isAuthenticated}">登录</a>

                <!-- 登录后显示：欢迎信息 + 角色 + 退出 (使用 Thymeleaf Spring Security extras) -->
                <span sec:authorize="isAuthenticated()">
                    欢迎：<span th:text="${username}"></span>
                    &nbsp;
                    角色：
                    <span th:each="auth,iter : ${#authentication.principal.authorities}" th:text="${auth.authority} + (iter.last? '' : ', ')"></span>
                    &nbsp;
                    <form id="formLogout" th:action="@{/logout}" method="post" style="display: inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <a href="javascript:document.getElementById('formLogout').submit();" class="btn btn-warning btn-sm">退出</a>
                    </form>
                </span>
            </div>
        </div>
    </nav>

    <!-- 主体内容 -->
    <div style="text-align: center; margin-top: 150px;">
        <h2>欢迎来到图书管理系统</h2>
        <div style="margin-top: 50px;">
            <!-- 图书列表按钮 - 所有登录用户可见 -->
            <a href="/bookList" class="btn btn-primary btn-lg"
               th:if="${isAuthenticated}"
               style="margin: 20px; padding: 15px 40px; font-size: 24px;">
                图书列表
            </a>
            <!-- 产品列表按钮 - 所有登录用户可见 -->
            <a href="/product/list" class="btn btn-success btn-lg"
               th:if="${isAuthenticated}"
               style="margin: 20px; padding: 15px 40px; font-size: 24px;">
                产品列表
            </a>
        </div>

        <!-- admin才能看到的管理入口 -->
        <div style="margin-top: 40px;" th:if="${isAdmin}">
            <hr style="width: 50%;"/>
            <h4>管理员功能</h4>
            <a href="/addbook" class="btn btn-info" style="margin: 10px;">添加图书</a>
            <a href="/product/add" class="btn btn-info" style="margin: 10px;">添加产品</a>
        </div>

        <!-- 未登录时的提示 -->
        <div th:if="not ${isAuthenticated}" style="margin-top: 80px;">
            <p class="text-muted">请先登录以访问系统功能</p>
        </div>
    </div>

    <script type="text/javascript" th:src="@{/js/jquery-1.11.0.min.js}" src="../static/js/jquery-1.11.0.min.js"></script>
    <script type="text/javascript" th:src="@{/js/bootstrap.min.js}" src="../static/js/bootstrap.min.js"></script>
</body>
</html>
