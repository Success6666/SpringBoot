<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"></meta>
<title>编辑图书页面</title>
<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" href="../static/css/bootstrap.min.css" />
<link rel="stylesheet" th:href="@{/css/bootstrap-theme.min.css}" href="../static/css/bootstrap-theme.min.css" />
</head>
<body>
	<div class="panel panel-primary">
		<div class="panel-heading">
			<h3 class="panel-title">编辑图书</h3>
		</div>
	</div>
	<div class="container">
		<div class="col-sm-12">
				<form th:action="@{/editBook}" th:object="${book}" class="form-horizontal" role="form" method="post" >
						<input type="hidden" th:field="*{bookId}" />
                        <div class="form-group">
                            <label for="book_title" class="col-sm-3 control-label">书名</label>
                            <div class="col-sm-9">
                                <input type="text" class="form-control" id="book_title" th:field="*{title}" >
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="book_author" class="col-sm-3 control-label">作者</label>
                            <div class="col-sm-9">
                                <input type="text" class="form-control" id="book_author" th:field="*{author}">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="book_price" class="col-sm-3 control-label">售价</label>
                            <div class="col-sm-9">
                                <input type="text" class="form-control" id="book_price" th:field="*{price}">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="book_image" class="col-sm-3 control-label">封面</label>
                            <div class="col-sm-9">
                                <input type="text" class="form-control" id="book_image" th:field="*{image}">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="book_category" class="col-sm-3 control-label">分类</label>
                            <div class="col-sm-9">
                                <select class="form-control" id="book_category" th:field="*{categoryId}">
                                    <option value="">请选择分类</option>
                                    <option th:each="category : ${categoryList}"
                                            th:value="${category.categoryId}"
                                            th:text="${category.categoryName}">分类</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="col-sm-9 col-sm-offset-3">
                                 <button type="submit" class="btn btn-success">保存</button>
                                 <a href="/bookList" class="btn btn-default">取消</a>
                            </div>
                        </div>
                    </form>
		</div>
	</div>
</body>
</html>
